name: Governance CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  governance-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check diff whitespace
        run: git diff --check

      - name: Run governance checks
        run: ./tools/governance-ci/run-all-checks.sh

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - name: Resolve Flutter dependencies
        working-directory: implementation/mobile/runiac_app
        run: flutter pub get

      - name: Analyze Flutter app
        working-directory: implementation/mobile/runiac_app
        run: flutter analyze --no-pub

      - name: Test Flutter app
        working-directory: implementation/mobile/runiac_app
        run: flutter test --no-pub

  backend-emulator-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            functions/package-lock.json
            tests/firebase-rules/package-lock.json

      - name: Set up Java 21 for Firebase emulators
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-firebase-tools-14.27.0

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Install rules-test dependencies
        working-directory: tests/firebase-rules
        run: npm ci

      - name: Run Functions emulator suites (main, feed, moderation, challenge, friends)
        working-directory: functions
        run: npm test

      - name: Run Firestore/Storage rules suite
        working-directory: tests/firebase-rules
        run: npm test
