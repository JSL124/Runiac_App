name: Governance CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  governance-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check diff whitespace
        run: git diff --check

      - name: Run governance checks
        run: ./tools/governance-ci/run-all-checks.sh
